<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Core -->
    <title>B.O.M.B.S — Back On My Bullshit | Premium Brutalist Streetwear</title>
    <meta name="description" content="B.O.M.B.S — Back On My Bullshit. Industrial brutalist streetwear for the bold and unapologetic. Shop our exclusive drops: premium heavy-cotton tees, outerwear, and accessories." />
    <meta name="keywords" content="BOMBS, BOMBS brand, Back On My Bullshit, streetwear, brutalist fashion, underground clothing, syndicate streetwear, urban apparel, graphic tees" />
    <meta name="author" content="BOMBS Brand" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />
    <link rel="canonical" href="https://bombsbrand.com/" />

    <!-- Open Graph (Facebook/LinkedIn/Discord) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="B.O.M.B.S — Premium Brutalist Streetwear" />
    <meta property="og:description" content="Industrial brutalist streetwear for the bold and unapologetic. Welcome to the Syndicate." />
    <meta property="og:url" content="https://bombsbrand.com/" />
    <meta property="og:site_name" content="B.O.M.B.S Brand" />
    <meta property="og:image" content="https://bombsbrand.com/og-image.jpg" />
    <meta property="og:image:alt" content="BOMBS Streetwear Aesthetic" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@bombsbrand" />
    <meta name="twitter:creator" content="@bombsbrand" />
    <meta name="twitter:title" content="B.O.M.B.S — Premium Brutalist Streetwear" />
    <meta name="twitter:description" content="Industrial brutalist streetwear for the bold and unapologetic. Join the movement." />
    <meta name="twitter:image" content="https://bombsbrand.com/twitter-image.jpg" />

    <!-- Fonts: preconnect + preload for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,900;1,900&family=UnifrakturMaguntia&family=Caveat:wght@700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,900;1,900&family=UnifrakturMaguntia&family=Caveat:wght@700&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
